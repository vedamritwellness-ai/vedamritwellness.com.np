<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Vedamrit Wellness - Under Construction</title>
  <style>
    body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #f2f7f5; color: #2d3748; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; text-align: center; }
    .card { max-width: 550px; padding: 50px 40px; background: white; border-radius: 16px; box-shadow: 0 10px 30px rgba(0,0,0,0.04); border-top: 5px solid #2c7a7b; margin: 20px; }
    .logo-icon { font-size: 3rem; margin-bottom: 10px; }
    h1 { color: #2c7a7b; font-size: 2.2rem; margin: 0 0 15px 0; font-weight: 700; }
    p { font-size: 1.1rem; color: #718096; line-height: 1.7; margin: 0 0 30px 0; }
    .status { display: inline-block; padding: 6px 14px; background: #e6fffa; color: #234e52; font-weight: 600; border-radius: 20px; font-size: 0.85rem; margin-bottom: 25px; text-transform: uppercase; letter-spacing: 1px; }
    .contact-pane { background: #f7fafc; border: 1px solid #edf2f7; padding: 20px; border-radius: 12px; display: flex; flex-direction: column; gap: 15px; }
    .contact-label { font-size: 0.8rem; text-transform: uppercase; letter-spacing: 1px; color: #a0aec0; font-weight: 700; margin-bottom: 5px; }
    .email-btn { color: #2c7a7b; font-size: 1.2rem; font-weight: 600; text-decoration: none; transition: color 0.2s; }
    .email-btn:hover { color: #1d4ed8; }
    .whatsapp-btn { display: inline-flex; align-items: center; justify-content: center; background: #25D366; color: white; padding: 12px 24px; border-radius: 30px; font-size: 1rem; font-weight: 600; text-decoration: none; transition: background 0.2s; box-shadow: 0 4px 12px rgba(37, 211, 102, 0.2); width: fit-content; margin: 0 auto; }
    .whatsapp-btn:hover { background: #128C7E; }
    .wa-icon { margin-right: 8px; font-size: 1.2rem; }
  </style>
</head>
<body>
  <div class="card">
    <img src="logo.png" alt="Vedamrit Wellness Logo" style="height: 80px; width: auto; margin-bottom: 20px; object-fit: contain;">
    <div class="status">Under Construction</div>
    <h1>VEDAMRIT WELLNESS PVT.LTD.</h1>
    <p>Our holistic wellness platform is currently being crafted. We are preparing a deeply rejuvenating digital experience for you. Stay tuned!</p>
    <div class="contact-pane">
      <div>
        <div class="contact-label">Email Us</div>
        <a href="mailto:info@vedamritwellness.com.np" class="email-btn">info@vedamritwellness.com.np</a>
      </div>
      <hr style="border: 0; border-top: 1px solid #edf2f7; margin: 5px 0;">
      <div>
        <div class="contact-label">Chat With Us</div>
        <!-- REPLACE THE PHONE NUMBER BELOW WITH YOUR ACTUAL WHATSAPP NUMBER INSTEAD OF 9779845233403 -->
        <a href="https://wa.me/9779845552675" target="_blank" class="whatsapp-btn">
          <span class="wa-icon">💬</span> Chat on WhatsApp
        </a>
      </div>
    </div>
  </div>
</body>
</html>
