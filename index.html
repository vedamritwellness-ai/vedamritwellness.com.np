<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Vedamrit Wellness - Under Construction</title>
  <style>
    body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #f2f7f5; color: #2d3748; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; text-align: center; }
    .card { max-width: 550px; padding: 50px 40px; background: white; border-radius: 16px; box-shadow: 0 10px 30px rgba(0,0,0,0.04); border-top: 5px solid #2c7a7b; margin: 20px; }
    .logo-icon { font-size: 3rem; margin-bottom: 10px; }
    h1 { color: #2c7a7b; font-size: 2.2rem; margin: 0 0 15px 0; font-weight: 700; }
    p { font-size: 1.1rem; color: #718096; line-height: 1.7; margin: 0 0 30px 0; }
    .status { display: inline-block; padding: 6px 14px; background: #e6fffa; color: #234e52; font-weight: 600; border-radius: 20px; font-size: 0.85rem; margin-bottom: 25px; text-transform: uppercase; letter-spacing: 1px; }
    .contact-pane { background: #f7fafc; border: 1px solid #edf2f7; padding: 20px; border-radius: 12px; }
    .contact-label { font-size: 0.8rem; text-transform: uppercase; letter-spacing: 1px; color: #a0aec0; margin-bottom: 8px; font-weight: 700; }
    .email-btn { color: #2c7a7b; font-size: 1.2rem; font-weight: 600; text-decoration: none; transition: color 0.2s; }
    .email-btn:hover { color: #1d4ed8; }
  </style>
</head>
<body>
  <div class="card">
    <div class="logo-icon">🌿</div>
    <div class="status">Under Construction</div>
    <h1>Vedamrit Wellness Pvt. Ltd.</h1>
    <p>Our holistic wellness platform is currently being crafted. We are preparing a deeply rejuvenating digital experience for you. Stay tuned!</p>
    <div class="contact-pane">
      <div class="contact-label">Reach Our Team</div>
      <a href="mailto:info@vedamritwellness.com.np" class="email-btn">info@vedamritwellness.com.np</a>
    </div>
  </div>
</body>
</html>
